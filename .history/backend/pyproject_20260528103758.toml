[project]
name = "rag-agent-backend"
version = "0.1.0"
description = "FastAPI backend for the Agentic RAG platform."
requires-python = ">=3.11"
dependencies = [
    "alembic>=1.13.0",
    "asyncpg>=0.29.0",
    "celery>=5.4.0",
    "fastapi>=0.115.0",
    "greenlet>=3.0.0",
    "httpx>=0.27.0",
    "minio>=7.2.0",
    "passlib[bcrypt]>=1.7.4",
    "pgvector>=0.2.5",
    "psycopg[binary]>=3.2.0",
    "python-jose>=3.3.0",
    "pydantic-settings>=2.6.0",
    "python-dotenv>=1.0.0",
    "redis>=5.0.0",
    "sqlalchemy>=2.0.0",
    "uvicorn[standard]>=0.30.0",
]

[project.optional-dependencies]
dev = [
    "black>=24.0.0",
    "pytest>=8.0.0",
    "pytest-asyncio>=0.23.0",
    "ruff>=0.6.0",
]

[tool.setuptools]
packages = ["app", "alembic"]

[tool.black]
line-length = 88
target-version = ["py311"]

[tool.ruff]
line-length = 88
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B"]
